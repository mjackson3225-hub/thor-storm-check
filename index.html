<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storm Damage Check | Thor Contractors</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #F5F7FA;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 560px;
      margin: 40px auto;
      background: #FFFFFF;
      padding: 28px;
      border-radius: 14px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.08);
      border-top: 6px solid #283B62;
    }

    .step-label {
      font-size: 14px;
      color: #5272B2;
      font-weight: bold;
      margin-bottom: 10px;
      text-align: center;
    }

    h2 {
      color: #283B62;
      text-align: center;
      margin-top: 0;
      margin-bottom: 18px;
      line-height: 1.3;
    }

    p.subtext {
      text-align: center;
      color: #2F2E2E;
      margin-top: 0;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      background: #5272B2;
      color: #FFFFFF;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: #283B62;
    }

    .btn.secondary {
      background: #D9DEE8;
      color: #283B62;
    }

    .btn.call-btn {
      background: #ED930E;
    }

    .btn.call-btn:hover {
      background: #c97a0c;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #C9CED8;
      font-size: 14px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .field-label {
      font-size: 14px;
      font-weight: bold;
      color: #283B62;
      margin-top: 10px;
      margin-bottom: 4px;
    }

    .note {
      font-size: 13px;
      color: #666;
      margin-top: 8px;
      margin-bottom: 14px;
      text-align: center;
    }

    .error {
      color: #b42318;
      text-align: center;
      font-size: 14px;
      margin-top: 10px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .button-row {
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="container" id="app"></div>

  <script>
    let step = 1;
    let data = {};
    let errorMessage = '';

    function setError(message) {
      errorMessage = message;
      render();
    }

    function clearError() {
      errorMessage = '';
    }

    function next(key, value) {
      data[key] = value;
      clearError();
      step++;
      render();
    }

    function goBack() {
      clearError();
      if (step > 1) {
        step--;
        render();
      }
    }

    function renderError() {
      if (!errorMessage) return '';
      return `<div class="error">${errorMessage}</div>`;
    }

    function renderBackButton() {
      if (step === 1) return '';
      return `<button class="btn secondary" onclick="goBack()">Back</button>`;
    }

    function render() {
      const app = document.getElementById('app');

      if (step === 1) {
        app.innerHTML = `
          <div class="step-label">Step 1 of 7</div>
          <h2>What type of property is this?</h2>
          <p class="subtext">Answer a few quick questions so we can better understand what type of roofing help you may need.</p>
          ${renderError()}
          <button class="btn" onclick="next('propertyType','Residential')">Residential</button>
          <button class="btn" onclick="next('propertyType','Commercial')">Commercial</button>
        `;
      }

      if (step === 2) {
        app.innerHTML = `
          <div class="step-label">Step 2 of 7</div>
          <h2>What are you seeing?</h2>
          <p class="subtext">Choose the option that best fits what you’re noticing.</p>
          ${renderError()}
          <button class="btn" onclick="next('issueType','Missing shingles')">Missing shingles</button>
          <button class="btn" onclick="next('issueType','Water stain / active leak')">Water stain / active leak</button>
          <button class="btn" onclick="next('issueType','Siding / gutter / fascia damage')">Siding / gutter / fascia damage</button>
          <button class="btn" onclick="next('issueType','Flat roof issue')">Flat roof issue</button>
          <button class="btn" onclick="next('issueType','Not sure, just want inspection')">Not sure, just want inspection</button>
          <div class="button-row">
            ${renderBackButton()}
          </div>
        `;
      }

      if (step === 3) {
        app.innerHTML = `
          <div class="step-label">Step 3 of 7</div>
          <h2>How old is your roof?</h2>
          <p class="subtext">An estimate is totally fine.</p>
          ${renderError()}
          <button class="btn" onclick="next('roofAge','Less than 5 years')">Less than 5 years</button>
          <button class="btn" onclick="next('roofAge','5 to 10 years')">5 to 10 years</button>
          <button class="btn" onclick="next('roofAge','10 to 15 years')">10 to 15 years</button>
          <button class="btn" onclick="next('roofAge','15 to 20 years')">15 to 20 years</button>
          <button class="btn" onclick="next('roofAge','20 plus years')">20 plus years</button>
          <button class="btn" onclick="next('roofAge','Not sure')">Not sure</button>
          <div class="button-row">
            ${renderBackButton()}
          </div>
        `;
      }

      if (step === 4) {
        app.innerHTML = `
          <div class="step-label">Step 4 of 7</div>
          <h2>Did this happen after a recent storm?</h2>
          ${renderError()}
          <button class="btn" onclick="next('stormRelated','Yes')">Yes</button>
          <button class="btn" onclick="next('stormRelated','No')">No</button>
          <button class="btn" onclick="next('stormRelated','Not sure')">Not sure</button>
          <div class="button-row">
            ${renderBackButton()}
          </div>
        `;
      }

      if (step === 5) {
        app.innerHTML = `
          <div class="step-label">Step 5 of 7</div>
          <h2>Have you filed an insurance claim yet?</h2>
          ${renderError()}
          <button class="btn" onclick="next('claimStatus','Yes')">Yes</button>
          <button class="btn" onclick="next('claimStatus','No')">No</button>
          <button class="btn" onclick="next('claimStatus','Need help with that')">Need help with that</button>
          <div class="button-row">
            ${renderBackButton()}
          </div>
        `;
      }

      if (step === 6) {
        app.innerHTML = `
          <div class="step-label">Step 6 of 7</div>
          <h2>How soon do you need help?</h2>
          ${renderError()}
          <button class="btn" onclick="next('urgency','Emergency')">Emergency</button>
          <button class="btn" onclick="next('urgency','This week')">This week</button>
          <button class="btn" onclick="next('urgency','Just getting pricing')">Just getting pricing</button>
          <div class="button-row">
            ${renderBackButton()}
          </div>
        `;
      }

      if (step === 7) {
        app.innerHTML = `
          <div class="step-label">Step 7 of 7</div>
          <h2>Where should we send your inspection follow-up?</h2>
          <p class="subtext">The more details you give us, the faster we can understand your situation.</p>
          ${renderError()}
          
          <div class="field-label">Name</div>
          <input type="text" id="fullName" placeholder="Your name">

          <div class="field-label">Phone</div>
          <input type="text" id="phone" placeholder="Your phone number">

          <div class="field-label">Email</div>
          <input type="email" id="email" placeholder="Your email">

          <div class="field-label">Address</div>
          <input type="text" id="address" placeholder="Property address">

          <div class="field-label">Notes</div>
          <textarea id="notes" placeholder="Tell us anything else you want us to know"></textarea>

          <div class="button-row">
            <button class="btn" onclick="submitForm()">Submit My Request</button>
            ${renderBackButton()}
          </div>
        `;
      }

      if (step === 8) {
        app.innerHTML = `
          <h2>Thanks, we’ve got your request.</h2>
          <p class="subtext">
            Based on your answers, it looks like your property may need an inspection.
            We’ll reach out shortly.
            If this is urgent, call 440-339-3225 now.
          </p>
          <button class="btn call-btn" onclick="window.location.href='tel:4403393225'">Call 440-339-3225 Now</button>
        `;
      }
    }

    function submitForm() {
      const fullName = document.getElementById('fullName').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const address = document.getElementById('address').value.trim();
      const notes = document.getElementById('notes').value.trim();

      if (!fullName || !phone) {
        setError('Please enter at least your name and phone number.');
        return;
      }

      data.fullName = fullName;
      data.phone = phone;
      data.email = email;
      data.address = address;
      data.notes = notes;

 fetch("https://formspree.io/f/mlgowrkg", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify(data)
});

      clearError();
      step = 8;
      render();
    }

    render();
  </script>

</body>
</html>
