<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storm Damage Check | Thor Contractors</title>

<style>
body {
  font-family: Arial;
  background:#F5F7FA;
}

.container {
  max-width:500px;
  margin:50px auto;
  background:#fff;
  padding:25px;
  border-radius:14px;
  border-top:6px solid #283B62;
}

h2 {
  color:#283B62;
  text-align:center;
}

.btn {
  width:100%;
  padding:14px;
  margin:8px 0;
  background:#5272B2;
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.btn:hover {
  background:#283B62;
}

input {
  width:100%;
  padding:12px;
  margin:6px 0;
}

a button {
  background:#ED930E;
}
</style>

</head>

<body>

<div class="container" id="app"></div>

<script>
let step=1;
let data={};

function render(){
const app=document.getElementById('app');

if(step===1){
app.innerHTML=`
<h2>What type of property is this?</h2>
<button class="btn" onclick="next('type','Residential')">Residential</button>
<button class="btn" onclick="next('type','Commercial')">Commercial</button>`;
}

if(step===2){
if(data.type==='Residential'){
app.innerHTML=`
<h2>What are you seeing?</h2>
<button class="btn" onclick="next('issue','Shingles')">Missing shingles</button>
<button class="btn" onclick="next('issue','Leak')">Water stain or leak</button>
<button class="btn" onclick="next('issue','Exterior')">Siding / gutter damage</button>
<button class="btn" onclick="next('issue','Unknown')">Not sure</button>`;
}else{
app.innerHTML=`
<h2>Commercial issue?</h2>
<button class="btn" onclick="next('issue','Leak')">Roof leak</button>
<button class="btn" onclick="next('issue','Ponding')">Ponding water</button>
<button class="btn" onclick="next('issue','Membrane')">Membrane damage</button>
<button class="btn" onclick="next('issue','Unknown')">Not sure</button>`;
}
}

if(step===3){
app.innerHTML=`
<h2>How old is the roof?</h2>
<button class="btn" onclick="next('age','0-5')">0-5 years</button>
<button class="btn" onclick="next('age','10-15')">10-15 years</button>
<button class="btn" onclick="next('age','15-20')">15-20 years</button>
<button class="btn" onclick="next('age','20+')">20+ years</button>
<button class="btn" onclick="next('age','Unknown')">Not sure</button>`;
}

if(step===4){
if(data.type==='Residential'){
app.innerHTML=`
<h2>Did this happen after a storm?</h2>
<button class="btn" onclick="next('storm','Yes')">Yes</button>
<button class="btn" onclick="next('storm','No')">No</button>
<button class="btn" onclick="next('storm','Unknown')">Not sure</button>`;
}else{
app.innerHTML=`
<h2>What do you need?</h2>
<button class="btn" onclick="next('need','Repair')">Repair</button>
<button class="btn" onclick="next('need','Inspection')">Inspection</button>
<button class="btn" onclick="next('need','Replace')">Replacement quote</button>`;
}
}

if(step===5){
app.innerHTML=`
<h2>How soon do you need help?</h2>
<button class="btn" onclick="next('urgency','Emergency')">Emergency</button>
<button class="btn" onclick="next('urgency','Week')">This week</button>
<button class="btn" onclick="next('urgency','Later')">Just getting pricing</button>`;
}

if(step===6){
app.innerHTML=`
<h2>Your info</h2>
<input placeholder="Name" id="name">
<input placeholder="Phone" id="phone">
<button class="btn" onclick="submitForm()">Submit</button>`;
}

if(step===7){
let message = "We’ll reach out shortly.";

if(data.urgency==="Emergency" || data.issue==="Leak"){
message = "This looks urgent. Call now or we’ll contact you ASAP.";
}

app.innerHTML=`
<h2>Thanks!</h2>
<p>${message}</p>
<a href="tel:4403393225"><button class="btn">Call Now</button></a>`;
}
}

function next(k,v){
data[k]=v;
step++;
render();
}

function submitForm(){
data.name=document.getElementById('name').value;
data.phone=document.getElementById('phone').value;
console.log(data);
step++;
render();
}

render();
</script>

</body>
</html>
